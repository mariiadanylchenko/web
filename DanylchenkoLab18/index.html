<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Числова гра — Lab18</title>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f5f5f5;
      padding: 20px;
    }

    #start-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 90vh;
      gap: 20px;
    }
    #start-screen h1 { font-size: 42px; }
    #start-screen p  { font-size: 18px; color: #555; }

    #game-screen { display: none; }

    #timer {
      font-size: 26px;
      font-weight: bold;
      margin: 16px 0;
    }
    #timer.danger { color: #c0392b; }

    #grid {
      display: grid;
      grid-template-columns: repeat(5, 90px);
      grid-template-rows: repeat(5, 90px);
      border: 2px solid #333;
      margin: 0 auto 24px;
      width: 452px;
    }
    .cell {
      width: 90px;
      height: 90px;
      border: 1px solid #bbb;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.15s;
      user-select: none;
    }
    .cell:hover:not(.selected) { background: #eaf0fb; }
    .cell.selected {
      background: #c8f0d4;
      color: #2d8c4e !important;
      cursor: default;
    }

    .btn {
      padding: 12px 36px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      background: #5b8fc9;
      color: #fff;
      cursor: pointer;
      margin: 6px;
    }
    .btn:hover { background: #4a7ab5; }

    #stats-section { margin-top: 28px; }
    #stats-section h3 { margin-bottom: 10px; font-size: 20px; }

    #stats-table {
      margin: 0 auto;
      border-collapse: collapse;
      min-width: 340px;
    }
    #stats-table th,
    #stats-table td {
      border: 1px solid #ccc;
      padding: 8px 20px;
      font-size: 15px;
    }
    #stats-table thead { background: #e8e8e8; font-weight: bold; }
    #stats-table tr.best { background: #fff9c4; font-weight: bold; }
  </style>
</head>
<body>

  <div id="start-screen">
    <h1>Моя перша гра</h1>
    <button class="btn" id="btn-start">Почати гру</button>
  </div>

  <div id="game-screen">
    <div id="timer">Залишилось: 60</div>
    <div id="grid"></div>
    <button class="btn" id="btn-restart">Почати з початку</button>

    <div id="stats-section">
      <h3>Статистика</h3>
      <table id="stats-table">
        <thead>
          <tr>
            <th>Спроба</th>
            <th>Результат</th>
            <th>Час (сек)</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <script>
    const GRID_SIZE  = 25;
    const GAME_TIME  = 60;
    const FONT_SIZES = ['18px', '24px', '32px', '42px', '54px'];

    let nextNumber    = 1;
    let timeLeft      = GAME_TIME;
    let timerInterval = null;
    let attempts      = [];
    let attemptCount  = 0;

    function randomColor() {
      const h = Math.floor(Math.random() * 360);
      const s = 65 + Math.floor(Math.random() * 20);
      const l = 32 + Math.floor(Math.random() * 18);
      return `hsl(${h}, ${s}%, ${l}%)`;
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function buildGrid() {
      const numbers = shuffle([...Array(GRID_SIZE)].map((_, i) => i + 1));
      const $grid   = $('#grid').empty();

      numbers.forEach(num => {
        const size  = FONT_SIZES[Math.floor(Math.random() * FONT_SIZES.length)];
        const color = randomColor();

        $('<div class="cell">')
          .text(num)
          .css({ fontSize: size, color })
          .data('num', num)
          .on('click', onCellClick)
          .appendTo($grid);
      });
    }

    function onCellClick() {
      const $cell = $(this);
      const num   = $cell.data('num');

      if (num !== nextNumber) {
        alert('Не вірна цифра!');
        return;
      }

      $cell.addClass('selected').off('click');
      nextNumber++;

      if (nextNumber > GRID_SIZE) {
        clearInterval(timerInterval);
        const elapsed = GAME_TIME - timeLeft;
        recordAttempt('Перемога', elapsed);
        renderStats();
        setTimeout(() => {
          alert(`Вітаємо! Ви пройшли гру за ${elapsed} секунд!`);
          startRound();
        }, 60);
      }
    }

    function startRound() {
      nextNumber = 1;
      timeLeft   = GAME_TIME;
      clearInterval(timerInterval);
      $('#timer').removeClass('danger');
      buildGrid();
      updateTimerDisplay();

      timerInterval = setInterval(() => {
        timeLeft--;
        updateTimerDisplay();
        if (timeLeft <= 10) $('#timer').addClass('danger');

        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          const found = nextNumber - 1;
          recordAttempt(`Час вийшов (${found}/${GRID_SIZE})`, GAME_TIME);
          renderStats();
          alert(`Час вийшов! Ви встигли знайти ${found} чисел з ${GRID_SIZE}.`);
          startRound();
        }
      }, 1000);
    }

    function updateTimerDisplay() {
      $('#timer').text(`Залишилось: ${timeLeft}`);
    }

    function recordAttempt(result, time) {
      attemptCount++;
      attempts.push({ n: attemptCount, result, time });
    }

    function renderStats() {
      const wins   = attempts.filter(a => a.result === 'Перемога');
      const bestT  = wins.length ? Math.min(...wins.map(a => a.time)) : null;
      const $tbody = $('#stats-table tbody').empty();

      attempts.forEach(a => {
        const isBest = a.result === 'Перемога' && a.time === bestT;
        $('<tr>').toggleClass('best', isBest)
          .append($('<td>').text(a.n))
          .append($('<td>').text(a.result))
          .append($('<td>').text(a.time + ' сек'))
          .appendTo($tbody);
      });
    }

    $('#btn-start').on('click', () => {
      $('#start-screen').hide();
      $('#game-screen').show();
      startRound();
    });

    $('#btn-restart').on('click', () => {
      startRound();
    });
  </script>
</body>
</html>
