<body>
  <h1>Пункт 5: Цельсій у Фаренгейт</h1>

  <script>
    const tc = Number(prompt("Введіть температуру в градусах Цельсія:"));

    if (!Number.isNaN(tc)) {
      const tf = (9 / 5) * tc + 32;
      alert(tc + "°C = " + tf + "°F");
    } else {
      alert("Помилка: потрібно ввести число.");
    }
  </script>
</body>
